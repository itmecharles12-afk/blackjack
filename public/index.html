<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackJack</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1b1b1b;
            color: white;
            text-align: center;
            margin: 0;
            padding: 50px;
        }
        /* Style du mode Rénovation / Maintenance */
        #maintenance-banner {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: #ff4757;
        }
        /* Bouton de support */
        #support-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ed573;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .box {
            background: #2f3542;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #1e90ff;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Bandeau de Rénovation -->
    <div id="maintenance-banner">
        <h1>🚧 Site en Rénovation 🚧</h1>
        <p>Le site sera de retour très bientôt avec de superbes modifications ! Revenez plus tard.</p>
    </div>

    <h1>Mon Jeu de BlackJack</h1>
    
    <div class="box">
        <h3>Codes Promo Sécurisés</h3>
        <input type="text" id="promo-input" placeholder="Entre ton code...">
        <button onclick="applyPromo()">Appliquer</button>
        <p id="promo-msg"></p>
    </div>

    <!-- Bouton de contact en cas de problème -->
    <button id="support-btn" onclick="openSupport()">⚠️ Problème / Contact</button>

    <script>
        // Vérification de l'état du site (Maintenance)
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (data.maintenance) {
                    document.getElementById('maintenance-banner').style.display = 'flex';
                } else {
                    document.getElementById('maintenance-banner').style.display = 'none';
                }
            } catch (e) {
                console.error("Erreur de vérification du serveur");
            }
        }

        // Vérifier l'état toutes les 5 secondes
        setInterval(checkStatus, 5000);
        checkStatus();

        // Appliquer un code promo
        async function applyPromo() {
            const code = document.getElementById('promo-input').value.trim();
            const res = await fetch('/api/use-promo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            const data = await res.json();
            document.getElementById('promo-msg').innerText = data.message;
            document.getElementById('promo-msg').style.color = data.success ? '#2ed573' : '#ff4757';
        }

        // Action du bouton de contact en cas de problème
        function openSupport() {
            // Remplace par ton lien de contact, ton profil Discord, ou ton mail
            window.location.href = "mailto:ton-email@example.com?subject=Problème sur le BlackJack";
        }
    </script>
</body>
</html>
